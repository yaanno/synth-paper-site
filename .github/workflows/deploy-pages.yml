name: Deploy site to GitHub Pages

# Merging a Publish PR into the default branch is the publish action (ADR-0003):
# the push that lands the merge builds the Astro site and deploys it to GitHub Pages.
# The site is the whole repo now (ADR-0009), so every push to main deploys.
on:
  push:
    branches: [main]
  # Allows a manual re-deploy from the Actions tab.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site output
        uses: withastro/action@v3
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
